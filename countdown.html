<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:transparent;color:#37352f}
.widget{text-align:center;padding:16px 24px;width:100%;max-width:480px}
.label{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#9b9a97;margin-bottom:8px}
.countdown{display:flex;gap:12px;justify-content:center;align-items:baseline}
.unit{display:flex;flex-direction:column;align-items:center;min-width:56px}
.value{font-size:36px;font-weight:700;line-height:1.1;font-variant-numeric:tabular-nums}
.unit-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#9b9a97;margin-top:2px}
.separator{font-size:28px;font-weight:300;color:#d3d1cb;align-self:center;margin-bottom:16px}
.done{font-size:28px;font-weight:700;color:#2eaadc}
body.accent-red .value,body.accent-red .done{color:#e03e3e}
body.accent-blue .value,body.accent-blue .done{color:#2eaadc}
body.accent-green .value,body.accent-green .done{color:#0f7b6c}
body.accent-purple .value,body.accent-purple .done{color:#6940a5}
body.accent-orange .value,body.accent-orange .done{color:#d9730d}
@media(prefers-color-scheme:dark){body{color:#ffffffcf}.value{color:#ffffffcf}.label,.unit-label{color:#ffffff52}.separator{color:#ffffff29}}
</style>
</head>
<body>
<div class="widget"><div class="label" id="label"></div><div class="countdown" id="countdown"></div></div>
<script>
const p=new URLSearchParams(window.location.search),targetDate=p.get('date'),mode=p.get('mode')||'full',label=p.get('label')||'',accent=p.get('accent')||'default';
document.body.classList.add('accent-'+accent);
const labelEl=document.getElementById('label');
if(label){labelEl.textContent=label}else{labelEl.style.display='none'}
const c=document.getElementById('countdown');
if(!targetDate){c.innerHTML='<div style="color:#9b9a97;font-size:14px;">Add ?date=YYYY-MM-DDTHH:MM to URL</div>'}
else{const target=new Date(targetDate);
function pad(n){return String(n).padStart(2,'0')}
function mu(v,l){return'<div class="unit"><div class="value">'+v+'</div><div class="unit-label">'+l+'</div></div>'}
function sep(){return'<div class="separator">:</div>'}
function update(){const now=new Date();let diff=target-now;
if(diff<=0){c.innerHTML='<div class="done">Complete!</div>';return}
const ts=Math.floor(diff/1000),d=Math.floor(ts/86400),h=Math.floor((ts%86400)/3600),m=Math.floor((ts%3600)/60),s=ts%60;let html='';
if(mode==='days'){html=mu(d,d===1?'day':'days')}
else if(mode==='hm'){const th=Math.floor(ts/3600);html=mu(th,'hours')+sep()+mu(pad(m),'mins')}
else if(mode==='hms'){const th=Math.floor(ts/3600);html=mu(th,'hours')+sep()+mu(pad(m),'min')+sep()+mu(pad(s),'sec')}
else{if(d>0){html+=mu(d,d===1?'day':'days')+sep()}html+=mu(pad(h),'hrs')+sep()+mu(pad(m),'min')+sep()+mu(pad(s),'sec')}
c.innerHTML=html}update();setInterval(update,1000)}
</script>
</body>
</html>
