<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:transparent;color:#37352f;padding:0;margin:0}
.cd{font-size:14px;font-weight:400;padding:3px 2px;line-height:1.5;white-space:nowrap}
.cd .n{font-weight:600;font-variant-numeric:tabular-nums}
.cd .u{color:#9b9a97;font-size:13px}
.cd .done{font-weight:600}
body.accent-red .n,body.accent-red .done{color:#e03e3e}
body.accent-blue .n,body.accent-blue .done{color:#2eaadc}
body.accent-green .n,body.accent-green .done{color:#0f7b6c}
body.accent-purple .n,body.accent-purple .done{color:#6940a5}
body.accent-orange .n,body.accent-orange .done{color:#d9730d}
@media(prefers-color-scheme:dark){body{color:#ffffffcf}.cd .n{color:#ffffffcf}.cd .u{color:#ffffff52}}
.setup{padding:12px;max-width:300px}
.setup h3{font-size:13px;font-weight:600;margin-bottom:8px}
.setup label{font-size:11px;font-weight:500;color:#9b9a97;display:block;margin-bottom:2px}
.setup input,.setup select{width:100%;padding:4px 8px;border:1px solid #e3e2de;border-radius:4px;font-family:inherit;font-size:12px;outline:none;margin-bottom:8px}
.setup .row{display:flex;gap:6px}
.setup .row>*{flex:1}
.setup button{background:#2eaadc;color:#fff;border:none;border-radius:4px;padding:6px 12px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;width:100%}
.setup .result{font-size:10px;color:#9b9a97;word-break:break-all;background:#f7f6f3;padding:6px;border-radius:4px;margin-top:8px;user-select:all;cursor:text}
@media(prefers-color-scheme:dark){.setup h3{color:#ffffffcf}.setup input,.setup select{background:#2f3437;border-color:#444;color:#ffffffcf}.setup .result{background:#2f3437;color:#ffffff80}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const p=new URLSearchParams(window.location.search),td=p.get('date'),mode=p.get('mode')||'full',accent=p.get('accent')||'default';
document.body.classList.add('accent-'+accent);const app=document.getElementById('app');
if(!td){app.innerHTML='<div class="setup"><h3>Set up countdown</h3><div><label>Date</label><input type="date" id="d"></div><div class="row"><div><label>Time</label><input type="time" id="t"></div><div><label>Display</label><select id="m"><option value="full">Days + H:M:S</option><option value="days">Days only</option><option value="hm">Hours:Mins</option><option value="hms">H:M:S</option></select></div></div><div><label>Color</label><select id="a"><option value="default">Default</option><option value="blue">Blue</option><option value="red">Red</option><option value="green">Green</option><option value="purple">Purple</option><option value="orange">Orange</option></select></div><button id="g">Generate URL</button><div class="result" id="r" style="display:none"></div></div>';document.getElementById('g').addEventListener('click',function(){const d=document.getElementById('d').value,t=document.getElementById('t').value,m=document.getElementById('m').value,a=document.getElementById('a').value;if(!d){alert('Pick a date');return}const dt=t?d+'T'+t:d+'T00:00',base=location.origin+location.pathname,url=base+'?date='+encodeURIComponent(dt)+'&mode='+m+'&accent='+a,r=document.getElementById('r');r.style.display='block';r.textContent=url})}
else{const target=new Date(td);app.innerHTML='<div class="cd" id="c"></div>';const c=document.getElementById('c');function pad(n){return String(n).padStart(2,'0')}
function update(){const diff=target-new Date();if(diff<=0){c.innerHTML='<span class="done">Complete</span>';return}
const ts=Math.floor(diff/1000),d=Math.floor(ts/86400),h=Math.floor((ts%86400)/3600),m=Math.floor((ts%3600)/60),s=ts%60;
if(mode==='days')c.innerHTML='<span class="n">'+d+'</span> <span class="u">'+(d===1?'day':'days')+'</span>';
else if(mode==='hm'){const th=Math.floor(ts/3600);c.innerHTML='<span class="n">'+th+'</span><span class="u">h</span> <span class="n">'+pad(m)+'</span><span class="u">m</span>'}
else if(mode==='hms'){const th=Math.floor(ts/3600);c.innerHTML='<span class="n">'+th+'</span><span class="u">h</span> <span class="n">'+pad(m)+'</span><span class="u">m</span> <span class="n">'+pad(s)+'</span><span class="u">s</span>'}
else{let h2='';if(d>0)h2+='<span class="n">'+d+'</span><span class="u">'+(d===1?' day ':' days ')+'</span>';h2+='<span class="n">'+pad(h)+'</span><span class="u">h</span> <span class="n">'+pad(m)+'</span><span class="u">m</span> <span class="n">'+pad(s)+'</span><span class="u">s</span>';c.innerHTML=h2}}
update();setInterval(update,1000)}
</script>
</body>
</html>
